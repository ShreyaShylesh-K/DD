<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Memories — DD</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background:#f4f9ff;
      color:#142033;
      font-family:'Inter', sans-serif;
      background-image:
        radial-gradient(circle at top left, rgba(190,220,255,0.65), transparent 32%),
        linear-gradient(120deg, #edf7ff 0%, #f8fbff 45%, #eaf4ff 100%);
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    nav{
      height:90px;
      padding:0 70px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(244,249,255,0.72);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(190,215,245,0.55);
    }

    .logo{
      font-family:'Cormorant Garamond', serif;
      font-size:2.4rem;
      color:#315f96;
      letter-spacing:2px;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:42px;
      font-size:0.85rem;
      text-transform:uppercase;
      letter-spacing:3px;
      color:#6e86a3;
    }

    .start-btn{
      padding:14px 30px;
      border-radius:18px;
      border:1px solid #bdd7f7;
      background:rgba(255,255,255,0.45);
      color:#315f96;
    }

    main{
      padding:80px 10%;
    }

    .mini{
      color:#8396ab;
      font-size:0.85rem;
      text-transform:uppercase;
      letter-spacing:8px;
      margin-bottom:25px;
    }

    h1{
      font-family:'Cormorant Garamond', serif;
      font-size:5.5rem;
      font-weight:500;
      color:#162235;
      margin-bottom:20px;
    }

    .subtitle{
      color:#6a7f96;
      font-size:1.25rem;
      line-height:1.8;
      max-width:700px;
      margin-bottom:60px;
    }

    .entries-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
      gap:28px;
    }

    .entry-card{
      padding:32px;
      border-radius:26px;
      background:rgba(255,255,255,0.58);
      border:1px solid #d9e8f8;
      box-shadow:0 15px 35px rgba(150,190,230,0.12);
    }

    .entry-date{
      text-transform:uppercase;
      letter-spacing:2px;
      font-size:0.75rem;
      color:#8da3b8;
      margin-bottom:16px;
      line-height:1.7;
    }

    .entry-title{
      font-size:1.45rem;
      color:#2b496d;
      margin-bottom:14px;
    }

    .entry-text{
      color:#667b92;
      line-height:1.8;
      white-space:pre-wrap;
    }

    .empty{
      padding:35px;
      border-radius:24px;
      background:rgba(255,255,255,0.55);
      border:1px solid #d9e8f8;
      color:#73889f;
      line-height:1.8;
    }

    @media(max-width:700px){
      nav{
        padding:0 22px;
      }

      .nav-links{
        gap:16px;
        font-size:0.6rem;
      }

      h1{
        font-size:3.8rem;
      }

      main{
        padding:60px 7%;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="logo">DD</a>

    <div class="nav-links">
      <a href="memories.html">Memories</a>
      <a href="archive.html">Archive</a>
      <a href="login.html">Log In</a>
      <a href="start-writing.html" class="start-btn">Start Writing</a>
    </div>
  </nav>

  <main>
    <div class="mini">YOUR SAVED MOMENTS</div>

    <h1>Memories</h1>

    <p class="subtitle">
      Every entry you save becomes a small piece of your life,
      kept safely in your digital diary.
    </p>

    <div class="entries-grid" id="entriesGrid"></div>
  </main>

  <script>
    const entriesGrid = document.getElementById("entriesGrid");
    const entries = JSON.parse(localStorage.getItem("ddEntries")) || [];

    if(entries.length === 0){
      entriesGrid.innerHTML = `
        <div class="empty">
          No memories yet. Start writing your first diary entry and it will appear here.
        </div>
      `;
    } else {
      entries.reverse().forEach(function(entry){
        const card = document.createElement("div");
        card.className = "entry-card";

        card.innerHTML = `
          <div class="entry-date">
            ${entry.date} at ${entry.time}<br>
            Mood: ${entry.mood || "Not set"} • ${entry.visibility || "Private"}
          </div>

          <div class="entry-title">
            ${entry.title}
          </div>

          <div class="entry-text">
            ${entry.text}
          </div>
        `;

        entriesGrid.appendChild(card);
      });
    }
  </script>

</body>
</html>
