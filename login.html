<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Log In — DD</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background:#f4f9ff;
      font-family:'Inter', sans-serif;
      color:#142033;
      background-image:
        radial-gradient(circle at top left, rgba(190,220,255,0.65), transparent 32%),
        linear-gradient(120deg, #edf7ff 0%, #f8fbff 45%, #eaf4ff 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .auth-card{
      width:100%;
      max-width:560px;
      padding:50px;
      border-radius:32px;
      background:rgba(255,255,255,0.62);
      backdrop-filter:blur(18px);
      border:1px solid #d9e8f8;
      box-shadow:0 20px 60px rgba(150,190,230,0.18);
    }

    .logo{
      font-family:'Cormorant Garamond', serif;
      font-size:3rem;
      color:#315f96;
      margin-bottom:25px;
    }

    h1{
      font-family:'Cormorant Garamond', serif;
      font-size:4.5rem;
      font-weight:500;
      line-height:1;
      margin-bottom:18px;
      color:#162235;
    }

    .subtitle{
      color:#6a7f96;
      line-height:1.8;
      margin-bottom:38px;
      font-size:1.15rem;
    }

    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-bottom:34px;
    }

    .tab{
      padding:17px;
      border-radius:18px;
      border:1px solid #bdd7f7;
      background:rgba(255,255,255,0.55);
      color:#315f96;
      cursor:pointer;
      font-size:1rem;
      transition:0.3s;
    }

    .tab.active{
      background:#cfe6ff;
      box-shadow:0 12px 30px rgba(155,198,255,0.20);
    }

    label{
      display:block;
      margin-bottom:9px;
      color:#4f6988;
      font-size:0.95rem;
    }

    input{
      width:100%;
      padding:16px;
      margin-bottom:22px;
      border-radius:18px;
      border:1px solid #d5e7f8;
      background:#fbfdff;
      outline:none;
      font-size:1rem;
      color:#142033;
      font-family:'Inter', sans-serif;
    }

    input:focus{
      border-color:#9bc6ff;
      box-shadow:0 0 0 4px rgba(155,198,255,0.18);
    }

    .auth-btn{
      width:100%;
      padding:18px;
      border:none;
      border-radius:18px;
      background:#cfe6ff;
      color:#224d80;
      font-size:1rem;
      cursor:pointer;
      transition:0.3s;
      margin-top:8px;
      box-shadow:0 12px 30px rgba(155,198,255,0.25);
    }

    .auth-btn:hover{
      background:#bddcff;
      transform:translateY(-2px);
    }

    .message{
      display:none;
      margin-top:22px;
      padding:15px;
      border-radius:16px;
      background:#eef7ff;
      color:#5079a8;
      line-height:1.6;
    }

    .message.error{
      background:#fff2f2;
      color:#9b3d3d;
      border:1px solid #ffd1d1;
    }

    .back{
      display:block;
      text-align:center;
      margin-top:28px;
      color:#6e86a3;
      font-size:0.95rem;
    }

    .hidden{
      display:none;
    }

    @media(max-width:600px){
      .auth-card{
        padding:35px 25px;
      }

      h1{
        font-size:3.4rem;
      }
    }
  </style>
</head>

<body>

  <div class="auth-card">

    <a href="index.html" class="logo">DD</a>

    <h1 id="title">Welcome back</h1>

    <p class="subtitle" id="subtitle">
      Log in to enter your quiet space and continue writing your digital diary.
    </p>

    <div class="tabs">
      <button type="button" class="tab active" id="loginTab">Log In</button>
      <button type="button" class="tab" id="signupTab">Sign Up</button>
    </div>

    <form id="authForm">

      <div id="nameField" class="hidden">
        <label>Your Name</label>
        <input type="text" id="name" placeholder="Enter your name">
      </div>

      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required>

      <button type="submit" class="auth-btn" id="submitBtn">
        Log In
      </button>

    </form>

    <div class="message" id="messageBox"></div>

    <a href="index.html" class="back">← Back to home</a>

  </div>

  <script>
    const loginTab = document.getElementById("loginTab");
    const signupTab = document.getElementById("signupTab");
    const nameField = document.getElementById("nameField");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const submitBtn = document.getElementById("submitBtn");
    const authForm = document.getElementById("authForm");
    const messageBox = document.getElementById("messageBox");

    let mode = "login";

    function showMessage(text, type){
      messageBox.innerText = text;
      messageBox.style.display = "block";

      if(type === "error"){
        messageBox.classList.add("error");
      } else {
        messageBox.classList.remove("error");
      }
    }

    function switchToLogin(){
      mode = "login";

      loginTab.classList.add("active");
      signupTab.classList.remove("active");

      nameField.classList.add("hidden");

      title.innerText = "Welcome back";
      subtitle.innerText = "Log in to enter your quiet space and continue writing your digital diary.";
      submitBtn.innerText = "Log In";

      messageBox.style.display = "none";
    }

    function switchToSignup(){
      mode = "signup";

      signupTab.classList.add("active");
      loginTab.classList.remove("active");

      nameField.classList.remove("hidden");

      title.innerText = "Create your space";
      subtitle.innerText = "Sign up and start preserving your thoughts, memories, and little moments.";
      submitBtn.innerText = "Sign Up";

      messageBox.style.display = "none";
    }

    loginTab.addEventListener("click", switchToLogin);
    signupTab.addEventListener("click", switchToSignup);

    authForm.addEventListener("submit", function(event){
      event.preventDefault();

      const name = document.getElementById("name").value.trim() || "Diary Keeper";
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      let users = JSON.parse(localStorage.getItem("ddUsers")) || [];

      if(mode === "signup"){

        const existingUser = users.find(function(user){
          return user.email === email;
        });

        if(existingUser){
          showMessage("This email is already registered. Please log in instead.", "error");
          return;
        }

        const newUser = {
          name: name,
          email: email,
          password: password
        };

        users.push(newUser);

        localStorage.setItem("ddUsers", JSON.stringify(users));

        localStorage.setItem("ddUserName", name);
        localStorage.setItem("ddUserEmail", email);
        localStorage.setItem("ddLoggedIn", "true");

        showMessage("Account created successfully. Redirecting...", "success");

        setTimeout(function(){
          window.location.href = "start-writing.html";
        }, 800);
      }

      if(mode === "login"){

        const matchedUser = users.find(function(user){
          return user.email === email && user.password === password;
        });

        if(!matchedUser){
          showMessage("Wrong email or password. If you are new, sign up first.", "error");
          return;
        }

        localStorage.setItem("ddUserName", matchedUser.name);
        localStorage.setItem("ddUserEmail", matchedUser.email);
        localStorage.setItem("ddLoggedIn", "true");

        showMessage("Logged in successfully. Redirecting...", "success");

        setTimeout(function(){
          window.location.href = "start-writing.html";
        }, 800);
      }
    });
  </script>

</body>
</html>
