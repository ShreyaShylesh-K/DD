<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Archive — DD</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background:#f4f9ff;
      color:#142033;
      font-family:'Inter', sans-serif;
      background-image:
        radial-gradient(circle at top left, rgba(190,220,255,0.65), transparent 32%),
        linear-gradient(120deg, #edf7ff 0%, #f8fbff 45%, #eaf4ff 100%);
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    nav{
      height:90px;
      padding:0 70px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(244,249,255,0.72);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(190,215,245,0.55);
    }

    .logo{
      font-family:'Cormorant Garamond', serif;
      font-size:2.4rem;
      color:#315f96;
      letter-spacing:2px;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:42px;
      font-size:0.85rem;
      text-transform:uppercase;
      letter-spacing:3px;
      color:#6e86a3;
    }

    .start-btn{
      padding:14px 30px;
      border-radius:18px;
      border:1px solid #bdd7f7;
      background:rgba(255,255,255,0.45);
      color:#315f96;
    }

    main{
      padding:80px 10%;
    }

    .mini{
      color:#8396ab;
      font-size:0.85rem;
      text-transform:uppercase;
      letter-spacing:8px;
      margin-bottom:25px;
    }

    h1{
      font-family:'Cormorant Garamond', serif;
      font-size:5.5rem;
      font-weight:500;
      color:#162235;
      margin-bottom:20px;
    }

    .subtitle{
      color:#6a7f96;
      font-size:1.25rem;
      line-height:1.8;
      max-width:750px;
      margin-bottom:60px;
    }

    .archive-list{
      max-width:900px;
    }

    .archive-item{
      display:flex;
      justify-content:space-between;
      gap:25px;
      padding:26px 0;
      border-bottom:1px solid #d9e8f8;
    }

    .archive-date{
      min-width:210px;
      color:#8da3b8;
      text-transform:uppercase;
      letter-spacing:2px;
      font-size:0.78rem;
      line-height:1.7;
    }

    .archive-content h2{
      color:#2b496d;
      font-size:1.4rem;
      margin-bottom:10px;
      font-weight:500;
    }

    .archive-content p{
      color:#667b92;
      line-height:1.8;
    }

    .empty{
      padding:35px;
      border-radius:24px;
      background:rgba(255,255,255,0.55);
      border:1px solid #d9e8f8;
      color:#73889f;
      line-height:1.8;
    }

    @media(max-width:700px){
      nav{
        padding:0 22px;
      }

      .nav-links{
        gap:16px;
        font-size:0.6rem;
      }

      main{
        padding:60px 7%;
      }

      h1{
        font-size:3.8rem;
      }

      .archive-item{
        flex-direction:column;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="logo">DD</a>

    <div class="nav-links">
      <a href="memories.html">Memories</a>
      <a href="archive.html">Archive</a>
      <a href="login.html">Log In</a>
      <a href="start-writing.html" class="start-btn">Start Writing</a>
    </div>
  </nav>

  <main>
    <div class="mini">YOUR LIFE BY TIME</div>

    <h1>Archive</h1>

    <p class="subtitle">
      A simple timeline of your saved diary entries,
      arranged like small windows into different days.
    </p>

    <div class="archive-list" id="archiveList"></div>
  </main>

  <script>
    const archiveList = document.getElementById("archiveList");
    const entries = JSON.parse(localStorage.getItem("ddEntries")) || [];

    if(entries.length === 0){
      archiveList.innerHTML = `
        <div class="empty">
          Your archive is empty. Write your first entry to begin your timeline.
        </div>
      `;
    } else {
      entries.reverse().forEach(function(entry){
        const item = document.createElement("div");
        item.className = "archive-item";

        item.innerHTML = `
          <div class="archive-date">
            ${entry.date}<br>
            ${entry.time}<br>
            ${entry.visibility || "Private"}
          </div>

          <div class="archive-content">
            <h2>${entry.title}</h2>
            <p>${entry.text.substring(0, 180)}...</p>
          </div>
        `;

        archiveList.appendChild(item);
      });
    }
  </script>

</body>
</html>
